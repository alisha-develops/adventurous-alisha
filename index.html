<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personal site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="introsvg">
        <img src="svgcode/intro1.svg" id="cloudsvg">
        <img src="svgcode/plane.svg" id="planesvg">
        <img src="svgcode/ch1.svg" id="ch1">
        <!-- <img src="svgcode/ch2.svg" id="ch2"> -->
        <button id="startbutton">start adventure</button>
        <div class="intro">
            <h1>Hi, I'm Alisha!</h1>
            <h1>where will we go next?</h1>
        </div>
    </div>
</header>
<main>
    <section class="projects">
        <p>This is the next section</p>
        <img src="svgcode/mountain.svg" id="mountainsvg">
        <div id="projectwindow">
            <button id="closeproject">✕</button>
            <iframe id="projectframe" src="https://simple-harmonic-motion.vercel.app/"></iframe>
        </div>

            <img src="photos/pink_flag-removebg-preview.png" class="flag" id="flag1">

        <a href="link2" target="_blank">
            <img src="photos/pink_flag-removebg-preview.png" class="flag" id="flag2">
        </a>
        <a href="link3" target="_blank">
            <img src="photos/pink_flag-removebg-preview.png" class="flag" id="flag3">
        </a>

        <a href="https://github.com/alisha-develops" target="_blank">
            <img src="svgcode/camp.svg" class="campsvg">
        </a>
    </section>

    <section class="forest">
        <p>This is the next section</p>
        <img src="photos/burning_fire-removebg-preview (1).png" class="bonfiresvg" id="closedfire">
        <div id="chatwindow">
            <div id="chatting">
                <button id="closechat">✕</button>
                <div id="chat">
                    <p id="chattext">hey traveller! welcome to my bonfire!</p>
                </div>
                <div id="responses">
                    <button class="reply">tell me about yourself!</button>
                    <button class="reply">what projects have you worked on?</button>
                    <button class="reply">how can i reach you?</button>
                </div>
                <button id="playgame">wanna play a mini game?</button>
            </div>
            <div id="game"style="display:none; position:absolute; top:0; left:0; width:100%; height:100%;">
                <button id="backtofire">← back to campfire</button>
                <iframe id="gameframe" src="game/game.html"></iframe>
            </div>
        </div>
        <img src="photos/an-old-book-with-a-ring-on-it-vector-removebg-preview.png" class="book" id="closedbook">
        <img src="photos/Group 55.png" id="bush">
        <div id="backdrop"></div>
        <img src="svgcode/openbook.svg" id="openbook">
        <button id="closebook">✕</button>
        <div id="bookcontent">
            <div class="leftpage">
                <img class="myphotos" src="photos/Untitled design.png" alt="alisha">
                <img class="myphotos" src="photos/me me.jpg" alt="alisha">
                <img class="myphotos" src="photos/JGukxl.jpg" alt="alisha">
            </div>
            <div class="rightpage">
                <h2>hi, i'm alisha!</h2>
                <p>lalalalalala</p>
                <p>i love building beautiful experiences and going on adventures!</p>
            </div>
        </div>
        <img src="svgcode/forest2x.svg" id="forestsvg">
    </section>
</main>
<footer>

</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
	<script src="script.js"></script>
</body>
</html>
